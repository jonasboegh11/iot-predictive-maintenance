name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Hent kode
        uses: actions/checkout@v4

      - name: Sæt Python op
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Installer pakker
        run: pip install -r requirements.txt

      - name: Kør tests
        run: pytest tests/

      - name: Byg Docker image
        run: docker build -t iot-predictive-maintenance .